<div class="auth-container">
  <div class="auth-background">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>
  
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-section">
        <div class="logo-icon">
          <mat-icon>how_to_vote</mat-icon>
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in to your Ayala Web account</p>
      </div>
    </div>

    <div class="auth-content">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <!-- Error Alert -->
        <div class="error-alert" *ngIf="errorMessage">
          <mat-icon>error_outline</mat-icon>
          <div class="error-content">
            <span>{{ errorMessage }}</span>
            <button type="button" class="close-error" (click)="clearError()">
              <mat-icon>close</mat-icon>
            </button>
          </div>
        </div>
                
        <div class="form-group">
          <mat-form-field appearance="outline" class="modern-field">
            <mat-label>Email Address</mat-label>
            <input matInput formControlName="email" type="email" required>
            <mat-icon matPrefix>email</mat-icon>
            <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
              Email is required
            </mat-error>
            <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
              Please enter a valid email
            </mat-error>
          </mat-form-field>
        </div>

        <div class="form-group">
          <mat-form-field appearance="outline" class="modern-field">
            <mat-label>Password</mat-label>
            <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" required>
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
              Password is required
            </mat-error>
          </mat-form-field>
          <div class="text-right">
            <a mat-button routerLink="/fp">Forgot Password?</a>
          </div>          
        </div>

        <div class="form-actions">
          <button mat-raised-button 
                  type="submit" 
                  class="auth-button primary-button"
                  [disabled]="loginForm.invalid || isLoading">
            <span *ngIf="!isLoading">Sign In</span>
            <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          </button>
        </div>
      </form>

      <div class="auth-footer">
        <div class="divider">
          <span>Don't have an account?</span>
        </div>
        <button mat-stroked-button 
                routerLink="/register" 
                class="auth-button secondary-button">
          Create Account
        </button>
      </div>
    </div>
  </div>
</div>
